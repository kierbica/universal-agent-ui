<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Hub</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- Auth banner -->
  <div id="auth-banner" class="hidden">
    <span id="auth-banner-text">Not authenticated</span>
    <button id="auth-dismiss">Dismiss</button>
  </div>

  <!-- Layout -->
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1 id="app-title">Agent Hub</h1>
        <span class="badge" id="provider-badge">universal</span>
      </div>

      <!-- Provider selector -->
      <div class="provider-selector">
        <label class="provider-label">Provider</label>
        <div class="provider-dropdown" id="provider-dropdown">
          <button class="provider-trigger" id="provider-trigger">
            <span class="provider-icon" id="current-provider-icon">🤖</span>
            <span class="provider-name" id="current-provider-name">Loading...</span>
            <svg class="dropdown-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </button>
          <div class="provider-menu hidden" id="provider-menu"></div>
        </div>
      </div>

      <button id="new-chat" class="new-chat-btn">+ New Chat</button>

      <div class="sidebar-section-label">Sessions</div>
      <div id="session-list">
        <div class="loading-sessions">Loading...</div>
      </div>

      <div class="sidebar-footer">
        <div class="model-info" id="model-info">Select a provider</div>
        <div id="session-count"></div>
        <button class="settings-btn" id="settings-btn" title="Provider Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main id="main">
      <div id="chat-container">
        <!-- Messages -->
        <div id="messages">
          <div class="welcome" id="welcome">
            <div class="welcome-icon" id="welcome-icon">🤖</div>
            <h2 id="welcome-title">Agent Hub</h2>
            <p id="welcome-desc">Select a coding agent provider and send a message to get started.</p>
          </div>
        </div>

        <!-- Thinking indicator -->
        <div id="thinking" class="hidden">
          <div class="thinking-dots">
            <span></span><span></span><span></span>
          </div>
          <span id="thinking-text">Thinking...</span>
        </div>

        <!-- Error -->
        <div id="error-banner" class="hidden">
          <span id="error-text"></span>
          <button id="error-dismiss">×</button>
        </div>

        <!-- Input area -->
        <div id="input-area">
          <div id="input-wrapper">
            <textarea
              id="message-input"
              rows="1"
              placeholder="Send a message..."
              autofocus
            ></textarea>
            <button id="send-btn" disabled aria-label="Send message">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13"/>
                <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
              </svg>
            </button>
          </div>
          <div class="input-footer">
            <span id="input-footer-text">Universal Agent UI</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-backdrop" id="settings-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>Provider Settings</h3>
        <button class="modal-close" id="settings-close">×</button>
      </div>
      <div class="modal-body" id="settings-body">
        <p class="settings-hint">Configure your coding agent providers.</p>
        <div id="settings-providers"></div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
